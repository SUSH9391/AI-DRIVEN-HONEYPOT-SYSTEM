<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - ShopSmart</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', path='css/main.css') }}">
  <style>
    /* Additional styles for admin login */
    .header {
      background-color: #303f9f;
      color: white;
      padding: 15px 0;
      box-shadow: 0 3px 6px rgba(0, 0, 0, 0.16), 0 3px 6px rgba(0, 0, 0, 0.23);
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    
    .header-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: white;
      display: flex;
      align-items: center;
    }
    
    .logo i {
      margin-right: 0.5rem;
    }
    
    .nav {
      display: flex;
      align-items: center;
    }
    
    .nav-list {
      display: flex;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    
    .nav-item {
      margin-left: 1.5rem;
    }
    
    .nav-link {
      color: white;
      font-weight: 500;
      transition: opacity 0.2s ease;
    }
    
    .nav-link:hover {
      opacity: 0.8;
      color: white;
    }
    
    .nav-link.active {
      border-bottom: 2px solid white;
    }
    
    .container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1rem;
    }
    
    .form-container {
      max-width: 500px;
      margin: 2rem auto;
      background-color: white;
      border-radius: 8px;
      box-shadow: 0 3px 6px rgba(0, 0, 0, 0.16), 0 3px 6px rgba(0, 0, 0, 0.23);
      padding: 2rem;
    }
    
    .form-title {
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
      text-align: center;
      color: #303f9f;
    }
    
    .form-group {
      margin-bottom: 1rem;
    }
    
    .form-label {
      display: block;
      margin-bottom: 0.25rem;
      font-weight: 500;
    }
    
    .form-input {
      width: 100%;
      padding: 1rem;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      font-size: 1rem;
      transition: border-color 0.2s ease;
    }
    
    .form-input:focus {
      outline: none;
      border-color: #3f51b5;
    }
    
    .form-button {
      width: 100%;
      padding: 1rem;
      background-color: #303f9f;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }
    
    .form-button:hover {
      background-color: #1a237e;
    }
    
    .form-footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.875rem;
      color: #757575;
    }
    
    .form-footer a {
      color: #3f51b5;
      font-weight: 500;
    }
    
    .alert {
      padding: 1rem;
      border-radius: 4px;
      margin-bottom: 1rem;
    }
    
    .alert-danger {
      background-color: rgba(244, 67, 54, 0.1);
      color: #f44336;
      border: 1px solid rgba(244, 67, 54, 0.2);
    }
    
    .input-group {
      position: relative;
    }
    
    .input-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: #757575;
    }
    
    .form-input {
      padding-left: 35px;
    }
    
    .admin-note {
      background-color: #f5f5f5;
      padding: 1rem;
      border-radius: 4px;
      margin-top: 1rem;
      font-size: 0.875rem;
      color: #757575;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="container header-container">
      <a href="/" class="logo">
        <i class="fas fa-shopping-bag"></i>
        ShopSmart Admin
      </a>
      <nav class="nav">
        <ul class="nav-list">
          <li class="nav-item"><a href="/" class="nav-link">Home</a></li>
          <li class="nav-item"><a href="/login" class="nav-link">Customer Login</a></li>
          <li class="nav-item"><a href="/admin_login" class="nav-link active">Admin</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- Admin Login Form -->
  <div class="container">
    <div class="form-container">
      <h2 class="form-title">Admin Login</h2>
      
      {% if message %}
        <div class="alert alert-danger">{{ message }}</div>
      {% endif %}
      
      <form method="POST" action="/admin_login">
        <div class="form-group">
          <label for="username" class="form-label">Username</label>
          <div class="input-group">
            <span class="input-icon"><i class="fas fa-user-shield"></i></span>
            <input type="text" name="username" id="username" class="form-input" placeholder="Admin username" required>
          </div>
        </div>
        
        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <div class="input-group">
            <span class="input-icon"><i class="fas fa-lock"></i></span>
            <input type="password" name="password" id="password" class="form-input" placeholder="Admin password" required>
          </div>
        </div>
        
        <div class="form-group">
          <button type="submit" class="form-button">
            <i class="fas fa-sign-in-alt"></i> Login
          </button>
        </div>
      </form>
      
      <div class="admin-note">
        <p><i class="fas fa-info-circle"></i> This portal is for authorized administrators only. Unauthorized access attempts will be logged and reported.</p>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer" style="background-color: #303f9f; color: white; padding: 2rem 0; margin-top: 3rem;">
    <div class="container" style="text-align: center; padding-top: 1rem; border-top: 1px solid rgba(255, 255, 255, 0.1);">
      <p>&copy; 2025 ShopSmart. All rights reserved. Admin Portal.</p>
    </div>
  </footer>
</body>
</html>
