#version: '3.8' obsolute, use version 3.9 or later

services:
 api:
  build:
    context: ..
    dockerfile: docker/Dockerfile
  ports:
    - "8000:8000"
  env_file:
    - ../.env
  depends_on:
    - postgres
    - redis
  volumes:
    - ../src:/app
  command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

volumes:
  postgres_data:
  redis_data:

