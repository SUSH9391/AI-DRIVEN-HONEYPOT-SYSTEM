
services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      DATABASE_HOST: postgres
    depends_on:
      - redis
      
    volumes:
      - ../src:/app
      - ../src/templates:/app/templates
      - ../src/static:/app/static
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: always

 

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: always

volumes:
  redis_data:
  
