{% extends "base.html" %}

{% block main %}
<div class="sandbox-immersion" style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #6c63ff 0%, #a855f7 100%); margin: -2rem;">
    
    <div style="width: 100%; max-width: 900px; background: white; border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); display: flex; overflow: hidden; height: 600px;">
        
        <!-- Left Side: Branding -->
        <div style="flex: 1; background: #f8f9fa; padding: 3rem; display: flex; flex-direction: column; justify-content: center; align-items: center; border-right: 1px solid #e9ecef; text-align: center;">
            <div style="font-size: 4rem; margin-bottom: 1rem;">🎁</div>
            <h1 style="font-size: 2.5rem; color: #1e293b; margin-bottom: 0.5rem; font-weight: 800;">GiftHub</h1>
            <p style="color: #64748b; font-size: 1.1rem;">Send joy instantly.</p>
            
            <div style="margin-top: 3rem; background: linear-gradient(135deg, #a855f7, #ec4899); border-radius: 12px; width: 100%; height: 180px; position: relative; overflow: hidden; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);">
                <div style="position: absolute; top: 1rem; left: 1.5rem; color: white; font-weight: bold; font-size: 1.2rem; display: flex; align-items: center; gap: 0.5rem;">
                    🎁 E-Gift Card
                </div>
                <div style="position: absolute; bottom: 1rem; left: 1.5rem; color: rgba(255,255,255,0.9); font-family: monospace; font-size: 1.2rem; letter-spacing: 2px;">
                    XXXX XXXX XXXX XXXX
                </div>
                <!-- decorative circles -->
                <div style="position: absolute; top: -50px; right: -50px; width: 150px; height: 150px; background: rgba(255,255,255,0.1); border-radius: 50%;"></div>
                <div style="position: absolute; bottom: -20px; right: 40px; width: 80px; height: 80px; background: rgba(255,255,255,0.1); border-radius: 50%;"></div>
            </div>
        </div>

        <!-- Right Side: Form -->
        <div style="flex: 1.2; padding: 3rem; overflow-y: auto;">
            <h2 style="color: #1e293b; margin-bottom: 1.5rem; font-size: 1.5rem;">Purchase Gift Card</h2>
            
            <form method="POST" action="/sandbox/attack">
                <input type="hidden" name="attack_type" value="carding">
                
                <h3 style="font-size: 0.9rem; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem;">1. Select Amount</h3>
                <div style="display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap;">
                    <button type="button" style="flex: 1; padding: 0.8rem; background: #f1f5f9; border: 2px solid transparent; border-radius: 8px; font-weight: bold; color: #334155; cursor: pointer; transition: all 0.2s;">$25</button>
                    <button type="button" style="flex: 1; padding: 0.8rem; background: #e0e7ff; border: 2px solid #6c63ff; border-radius: 8px; font-weight: bold; color: #4f46e5; cursor: pointer; transition: all 0.2s;">$50</button>
                    <button type="button" style="flex: 1; padding: 0.8rem; background: #f1f5f9; border: 2px solid transparent; border-radius: 8px; font-weight: bold; color: #334155; cursor: pointer; transition: all 0.2s;">$100</button>
                    <button type="button" style="flex: 1; padding: 0.8rem; background: #f1f5f9; border: 2px solid transparent; border-radius: 8px; font-weight: bold; color: #334155; cursor: pointer; transition: all 0.2s;">$200</button>
                </div>

                <h3 style="font-size: 0.9rem; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem;">2. Recipient</h3>
                <div style="margin-bottom: 1.5rem;">
                    <input type="email" name="recipient_email" placeholder="Recipient's Email Address" style="width: 100%; padding: 1rem; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; outline: none; font-size: 1rem;" required>
                </div>

                <h3 style="font-size: 0.9rem; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem;">3. Payment Details</h3>
                <div style="background: #f8fafc; padding: 1.5rem; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 2rem;">
                    <div style="margin-bottom: 1rem;">
                        <input type="text" name="card_number" placeholder="Card Number" style="width: 100%; padding: 1rem; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-family: monospace; font-size: 1.1rem; letter-spacing: 2px; outline: none; background: white;" required>
                    </div>
                    <div style="display: flex; gap: 1rem;">
                        <input type="text" name="expiry" placeholder="MM/YY" style="flex: 1; padding: 1rem; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-family: monospace; font-size: 1.1rem; outline: none; background: white; text-align: center;" required>
                        <input type="text" name="cvv" placeholder="CVV" style="flex: 1; padding: 1rem; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-family: monospace; font-size: 1.1rem; outline: none; background: white; text-align: center;" required>
                    </div>
                </div>

                <button type="submit" style="width: 100%; background: linear-gradient(135deg, #6c63ff, #a855f7); color: white; border: none; padding: 1rem; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: transform 0.1s; box-shadow: 0 4px 6px -1px rgba(108,99,255,0.4);">
                    Send Gift Card
                </button>
            </form>
        </div>

    </div>
</div>
{% endblock %}
