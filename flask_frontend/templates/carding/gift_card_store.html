{% extends "base.html" %}

{% block content %}
<div style="background: #fafafa; color: #222; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; border-radius: 12px; overflow: hidden; padding: 3rem 2rem; max-width: 800px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.05);">
    <div style="text-align: center; margin-bottom: 3rem;">
        <div style="display: inline-block; width: 50px; height: 50px; background: linear-gradient(135deg, #10b981, #059669); border-radius: 12px; color: white; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; margin-bottom: 1rem; margin-inline: auto;">GH</div>
        <h1 style="margin: 0; font-size: 2.5rem; letter-spacing: -1px;">GiftHub</h1>
        <p style="color: #666; font-size: 1.1rem;">Instant Digital Gift Cards</p>
    </div>

    <form action="{{ url_for('sandbox.attack') }}" method="POST">
        <!-- Gift Card Selection -->
        <h2 style="font-size: 1.25rem; font-weight: 500; margin-bottom: 1rem; border-bottom: 2px solid #eee; padding-bottom: 0.5rem;">1. Select Value</h2>
        <div style="display: flex; gap: 1rem; margin-bottom: 3rem; flex-wrap: wrap;">
            <label style="flex: 1; min-width: 100px; position: relative;">
                <input type="radio" name="amount" value="50" style="position: absolute; opacity: 0; width: 0; height: 0;" required>
                <div style="border: 2px solid #ddd; border-radius: 8px; padding: 1.5rem 1rem; text-align: center; cursor: pointer; transition: all 0.2s;" onclick="this.parentNode.parentNode.querySelectorAll('div').forEach(d=>d.style.borderColor='#ddd'); this.style.borderColor='#10b981';">
                    <div style="font-size: 1.5rem; font-weight: bold; color: #10b981;">$50</div>
                </div>
            </label>
            <label style="flex: 1; min-width: 100px; position: relative;">
                <input type="radio" name="amount" value="100" style="position: absolute; opacity: 0; width: 0; height: 0;" required>
                <div style="border: 2px solid #10b981; border-radius: 8px; padding: 1.5rem 1rem; text-align: center; cursor: pointer; transition: all 0.2s;" onclick="this.parentNode.parentNode.querySelectorAll('div').forEach(d=>d.style.borderColor='#ddd'); this.style.borderColor='#10b981';">
                    <div style="font-size: 1.5rem; font-weight: bold; color: #10b981;">$100</div>
                </div>
            </label>
            <label style="flex: 1; min-width: 100px; position: relative;">
                <input type="radio" name="amount" value="200" style="position: absolute; opacity: 0; width: 0; height: 0;" required>
                <div style="border: 2px solid #ddd; border-radius: 8px; padding: 1.5rem 1rem; text-align: center; cursor: pointer; transition: all 0.2s;" onclick="this.parentNode.parentNode.querySelectorAll('div').forEach(d=>d.style.borderColor='#ddd'); this.style.borderColor='#10b981';">
                    <div style="font-size: 1.5rem; font-weight: bold; color: #10b981;">$200</div>
                </div>
            </label>
            <label style="flex: 1; min-width: 100px; position: relative;">
                <input type="radio" name="amount" value="500" style="position: absolute; opacity: 0; width: 0; height: 0;" required>
                <div style="border: 2px solid #ddd; border-radius: 8px; padding: 1.5rem 1rem; text-align: center; cursor: pointer; transition: all 0.2s;" onclick="this.parentNode.parentNode.querySelectorAll('div').forEach(d=>d.style.borderColor='#ddd'); this.style.borderColor='#10b981';">
                    <div style="font-size: 1.5rem; font-weight: bold; color: #10b981;">$500</div>
                </div>
            </label>
        </div>

        <h2 style="font-size: 1.25rem; font-weight: 500; margin-bottom: 1rem; border-bottom: 2px solid #eee; padding-bottom: 0.5rem;">2. Recipient Email</h2>
        <div style="margin-bottom: 3rem;">
            <input type="email" name="recipient_email" style="width: 100%; padding: 1rem; border: 1px solid #ccc; border-radius: 8px; font-size: 1.1rem; background: transparent;" placeholder="recipient@example.com" required>
        </div>

        <h2 style="font-size: 1.25rem; font-weight: 500; margin-bottom: 1rem; border-bottom: 2px solid #eee; padding-bottom: 0.5rem;">3. Instant Payment</h2>
        <div style="background: white; border: 1px solid #ddd; border-radius: 8px; padding: 2rem;">
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 0.5rem; color: #555; font-size: 0.9rem;">Card Number</label>
                <input type="text" name="card_number" style="width: 100%; padding: 1rem; border: 1px solid #ccc; border-radius: 4px; font-family: monospace; font-size: 1.2rem; background: #fff;" placeholder="•••• •••• •••• ••••" required>
            </div>
            <div style="display: flex; gap: 1rem;">
                <div style="flex: 1;">
                    <label style="display: block; margin-bottom: 0.5rem; color: #555; font-size: 0.9rem;">Expiration</label>
                    <input type="text" name="expiration" style="width: 100%; padding: 1rem; border: 1px solid #ccc; border-radius: 4px; background: #fff; text-align: center;" placeholder="MM/YY" required>
                </div>
                <div style="flex: 1;">
                    <label style="display: block; margin-bottom: 0.5rem; color: #555; font-size: 0.9rem;">Security Code</label>
                    <input type="text" name="cvc" style="width: 100%; padding: 1rem; border: 1px solid #ccc; border-radius: 4px; background: #fff; text-align: center;" placeholder="CVC" required>
                </div>
            </div>
        </div>

        <button type="submit" style="width: 100%; background: #10b981; color: white; border: none; padding: 1.25rem; font-size: 1.25rem; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 2rem; box-shadow: 0 4px 14px rgba(16, 185, 129, 0.4);">
            Purchase Gift Card
        </button>
    </form>
</div>

{% include 'partials/score_overlay.html' %}
{% endblock %}
