{% extends "base.html" %}

{% block content %}
<div class="glass-card" style="max-width: 450px; margin: 4rem auto; text-align: center;">
    <h2 style="font-size: 2rem; margin-bottom: 0.5rem;">Join the Nexus</h2>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">Create an account to track your progress and earn XP.</p>
    
    <form method="POST" action="{{ url_for('auth.signup') }}" style="text-align: left;">
        <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Username / Hacker Alias</label>
        <input type="text" name="username" class="input-field" required placeholder="Neo">

        <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Email</label>
        <input type="email" name="email" class="input-field" required placeholder="neo@nexus.io">
        
        <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Password</label>
        <input type="password" name="password" class="input-field" required placeholder="••••••••">
        
        <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Register</button>
    </form>
    
    <p style="margin-top: 2rem; color: var(--text-muted);">
        Already active? <a href="{{ url_for('auth.login') }}" style="color: var(--accent); text-decoration: none;">Login</a>
    </p>
</div>
{% endblock %}
