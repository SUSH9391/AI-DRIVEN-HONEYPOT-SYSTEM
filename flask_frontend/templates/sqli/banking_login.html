{% extends "base.html" %}

{% block content %}
<div style="background: #ffffff; color: #333333; border-radius: 8px; overflow: hidden; font-family: Arial, sans-serif; min-height: 70vh;">
    <div style="background: #004488; padding: 1rem 2rem; color: white; display: flex; justify-content: space-between; align-items: center;">
        <h1 style="margin: 0; font-size: 1.5rem;">🏦 SecureBank Online</h1>
        <div style="font-size: 0.9rem;">Customer Service: 1-800-SECURE-1</div>
    </div>
    
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4rem 2rem;">
        <div style="background: #f9f9f9; padding: 2.5rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border: 1px solid #ddd;">
            <h2 style="text-align: center; color: #004488; margin-bottom: 2rem;">Sign On to Online Banking</h2>
            <form action="{{ url_for('sandbox.attack') }}" method="POST">
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; font-weight: bold; margin-bottom: 0.5rem;">User ID</label>
                    <input type="text" name="username" style="width: 100%; padding: 0.75rem; border: 1px solid #ccc; border-radius: 4px;" required>
                </div>
                
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; font-weight: bold; margin-bottom: 0.5rem;">Password</label>
                    <input type="password" name="password" style="width: 100%; padding: 0.75rem; border: 1px solid #ccc; border-radius: 4px;" required>
                </div>
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <label style="display: flex; align-items: center; font-size: 0.85rem; cursor: pointer;">
                        <input type="checkbox" name="remember" style="margin-right: 0.5rem;"> Remember Me
                    </label>
                    <a href="#" style="color: #004488; font-size: 0.85rem; text-decoration: none;">Forgot Password?</a>
                </div>
                
                <button type="submit" style="width: 100%; background: #004488; color: white; padding: 1rem; border: none; border-radius: 4px; font-size: 1.1rem; cursor: pointer; font-weight: bold;">Sign On</button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: #666;">
                Not enrolled? <a href="#" style="color: #004488;">Sign up now.</a>
            </p>
        </div>
    </div>
    <div style="background: #f1f1f1; padding: 1rem; text-align: center; font-size: 0.8rem; color: #666;">
        © 2026 SecureBank N.A. Member FDIC. Equal Housing Lender.
    </div>
</div>

{% include 'partials/score_overlay.html' %}
{% endblock %}
